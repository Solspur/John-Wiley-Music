<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Conversations With Myself // John Wiley</title>
    <style>
        :root {
            --paper: #e8dab2; 
            --midnight-dark: #070707; 
            --star: #fffef0; 
            --accent: #d1b87a;
            --serif: "EB Garamond", serif;
        }

        body {
            background-color: var(--midnight-dark);
            background-image: url('conversations-with-myself.png'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--paper);
            font-family: var(--serif);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(180deg, rgba(7,7,7,0.5) 0%, rgba(7,7,7,0.2) 50%, rgba(7,7,7,0.7) 100%);
            z-index: -1;
        }

        header { margin-bottom: 40px; text-align: center; }
        header h1 { 
            font-size: 3.5rem; 
            font-weight: 300; 
            font-style: italic; 
            margin: 0; 
            color: var(--star);
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }
        .subtitle { text-transform: uppercase; letter-spacing: 4px; font-size: 0.7rem; opacity: 0.8; margin-bottom: 25px; }

        .presave-link {
            display: inline-block;
            text-decoration: none;
            color: var(--midnight-dark);
            background: var(--paper);
            padding: 12px 25px;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 2px;
            transition: 0.4s ease;
        }

        .tracklist {
            width: 100%;
            max-width: 500px;
            margin-top: auto; 
            background: rgba(0, 0, 0, 0.4); 
            padding: 20px;
            border-radius: 4px;
            backdrop-filter: blur(4px);
        }

        .track-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(232, 218, 178, 0.1);
        }

        .track-name { font-size: 1.2rem; color: var(--star); }

        .claim-btn {
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
            font-family: var(--serif);
            font-size: 0.7rem;
            text-transform: uppercase;
            padding: 5px 12px;
            cursor: pointer;
            transition: 0.3s;
        }

        .claim-btn:hover { background: var(--accent); color: var(--midnight-dark); }
        .claimed-tag { font-style: italic; font-size: 0.9rem; color: var(--accent); }

        /* --- STORY OVERLAY STYLE --- */
        #story-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .story-card {
            background: var(--paper);
            color: var(--midnight-dark);
            padding: 40px;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0,0,0,1);
            position: relative;
            transform: rotate(-1deg);
        }

        .story-card h3 { font-family: var(--serif); font-style: italic; border-bottom: 1px solid rgba(0,0,0,0.1); padding-bottom: 10px; }
        .story-card p { font-size: 1.1rem; line-height: 1.6; margin: 20px 0; }
        
        .close-story {
            background: var(--midnight-dark);
            color: var(--paper);
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        footer { font-style: italic; opacity: 0.6; font-size: 0.8rem; margin-top: 30px; }
    </style>
</head>
<body>

    <header>
        <h1>Conversations with Myself</h1>
        <p class="subtitle">An EP by John Wiley</p>
        <a href="https://distrokid.com/hyperfollow/johnwiley/conversations-with-myself/" target="_blank" class="presave-link">Pre-save</a>
    </header>

    <div class="tracklist" id="tracklist-root"></div>

    <div id="story-overlay">
        <div class="story-card">
            <h3 id="story-title">Song Title</h3>
            <p id="story-text">This is what the song is about...</p>
            <button class="close-story" onclick="closeStory()">It is mine now.</button>
        </div>
    </div>

    <footer>choose the song that echoes your heart.</footer>

    <script>
        // --- ADD YOUR TRACK STORIES HERE ---
        const trackData = {
            "My letter to you": "A song about how you keep thinking about a certain moment with a special someone, and you write them a letter about it",
            "The Wait": "That restless feeling of waiting for someone to reply to your letter/message.",
            "My Little Lover Boy": "A response to your letter from that somoene you were thinking of.",
            "My best friend": "A tribute to the people who hold us together when we feel like we're drifting apart.",
            "Sunny Day": "A song about sharing a sunny day with someone, and they just seem extra special that day.",
            "Autumn Echoes": "The unexpected romantic lover who you cannot fall in love with, but cant help yourself",
            "In the sky": "A song about if someone feels the same way about you, as you do about them."
        };

        const tracks = Object.keys(trackData);

        function renderTracks() {
            const container = document.getElementById('tracklist-root');
            const claimedTrack = localStorage.getItem('claimedTrack');
            container.innerHTML = '';

            tracks.forEach((name, index) => {
                const isClaimed = claimedTrack === name;
                const item = document.createElement('div');
                item.className = `track-item ${isClaimed ? 'claimed' : ''}`;
                
                item.innerHTML = `
                    <div class="track-info">
                        <span class="track-name">${name}</span>
                    </div>
                    ${isClaimed 
                        ? `<span class="claimed-tag">Yours.</span>` 
                        : `<button class="claim-btn" onclick="showStory('${name}')">Claim</button>`}
                `;
                container.appendChild(item);
            });
        }

        function showStory(name) {
            document.getElementById('story-title').innerText = name;
            document.getElementById('story-text').innerText = trackData[name];
            document.getElementById('story-overlay').style.display = 'flex';
            // Save to storage immediately
            localStorage.setItem('claimedTrack', name);
        }

        function closeStory() {
            document.getElementById('story-overlay').style.display = 'none';
            renderTracks();
        }

        renderTracks();
    </script>
</body>
</html>
