<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Conversations With Myself // John Wiley</title>
    <style>
        :root {
            --paper: #e8dab2; 
            --midnight-dark: #070707; 
            --star: #fffef0; 
            --accent: #d1b87a;
            --serif: "EB Garamond", serif;
        }

        body {
            background-color: var(--midnight-dark);
            background-image: url('conversations-with-myself.png'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--paper);
            font-family: var(--serif);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        /* Dark overlay for readability */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(180deg, rgba(7,7,7,0.6) 0%, rgba(7,7,7,0.2) 50%, rgba(7,7,7,0.8) 100%);
            z-index: -1;
        }

        header { 
            margin-top: 20px; 
            margin-bottom: 30px; 
            text-align: center; 
            z-index: 10;
        }
        
        header h1 { 
            font-size: 2.5rem; /* Shrunk for mobile */
            font-weight: 300; 
            font-style: italic; 
            margin: 0; 
            color: var(--star);
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
        }
        
        .subtitle { 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            font-size: 0.65rem; 
            opacity: 0.9; 
            margin-bottom: 20px; 
        }

        .presave-link {
            display: inline-block;
            text-decoration: none;
            color: var(--midnight-dark);
            background: var(--paper);
            padding: 14px 30px; /* Larger tap target */
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 2px;
            transition: 0.4s ease;
            font-weight: bold;
        }

        .tracklist {
            width: 100%;
            max-width: 450px;
            margin-top: auto; 
            background: rgba(0, 0, 0, 0.6); 
            padding: 15px;
            border-radius: 8px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px); /* Safari support */
            margin-bottom: 20px;
        }

        .track-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0; /* Taller rows for fingers */
            border-bottom: 1px solid rgba(232, 218, 178, 0.1);
        }

        .track-name { font-size: 1.1rem; color: var(--star); max-width: 70%; }

        .claim-btn {
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
            font-family: var(--serif);
            font-size: 0.75rem;
            text-transform: uppercase;
            padding: 8px 16px; /* Bigger button for mobile */
            cursor: pointer;
        }

        .claimed-tag { font-style: italic; font-size: 0.9rem; color: var(--accent); }

        /* --- MOBILE STORY OVERLAY --- */
        #story-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .story-card {
            background: var(--paper);
            color: var(--midnight-dark);
            padding: 30px;
            width: 100%;
            max-width: 350px;
            text-align: center;
            border-radius: 2px;
        }

        .story-card p { font-size: 1rem; line-height: 1.5; margin: 15px 0; }
        
        .close-story {
            background: var(--midnight-dark);
            color: var(--paper);
            border: none;
            padding: 12px 24px;
            width: 100%;
            text-transform: uppercase;
            margin-top: 10px;
        }

        footer { font-style: italic; opacity: 0.7; font-size: 0.75rem; margin-bottom: 10px; }

        /* --- DESKTOP ADJUSTMENTS --- */
        @media (min-width: 768px) {
            header h1 { font-size: 4rem; }
            .tracklist { padding: 30px; }
            .track-name { font-size: 1.25rem; }
            body { padding: 40px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Conversations with Myself</h1>
        <p class="subtitle">An EP by John Wiley</p>
        <a href="https://distrokid.com/hyperfollow/johnwiley/conversations-with-myself/" target="_blank" class="presave-link">Pre-save EP</a>
    </header>

    <div class="tracklist" id="tracklist-root"></div>

    <div id="story-overlay">
        <div class="story-card">
            <h3 id="story-title" style="margin-top:0; font-style:italic;"></h3>
            <p id="story-text"></p>
            <button class="close-story" onclick="closeStory()">It is mine now.</button>
        </div>
    </div>

    <footer>choose the song that echoes your heart.</footer>

    <script>
        const trackData = {
            "My letter to you": "An honest opening. A message sent into the void, hoping the person on the other side still remembers the ink.",
            "The Wait": "That restless feeling of standing still while the world moves on. Written during a quiet midnight in West Virginia.",
            "My Little Lover Boy": "A nostalgic look at younger versions of ourselves and the simple, messy ways we used to love.",
            "My best friend": "A tribute to the people who hold us together when we feel like we're drifting apart.",
            "Sunny Day": "A moment of clarity. A rare afternoon where the shadows felt a little shorter and the air a little warmer.",
            "Autumn Echoes": "The sound of seasons changing. Leaf-fall, cold air, and the realization that some things are meant to fade.",
            "In the sky": "An ending and a beginning. Looking up and realizing how small our conversations are in the grand design."
        };

        const tracks = Object.keys(trackData);

        function renderTracks() {
            const container = document.getElementById('tracklist-root');
            const claimedTrack = localStorage.getItem('claimedTrack');
            container.innerHTML = '';

            tracks.forEach((name) => {
                const isClaimed = claimedTrack === name;
                const item = document.createElement('div');
                item.className = `track-item ${isClaimed ? 'claimed' : ''}`;
                
                item.innerHTML = `
                    <span class="track-name">${name}</span>
                    ${isClaimed 
                        ? `<span class="claimed-tag">Yours.</span>` 
                        : `<button class="claim-btn" onclick="showStory('${name}')">Claim</button>`}
                `;
                container.appendChild(item);
            });
        }

        function showStory(name) {
            document.getElementById('story-title').innerText = name;
            document.getElementById('story-text').innerText = trackData[name];
            document.getElementById('story-overlay').style.display = 'flex';
            localStorage.setItem('claimedTrack', name);
        }

        function closeStory() {
            document.getElementById('story-overlay').style.display = 'none';
            renderTracks();
        }

        renderTracks();
    </script>
</body>
</html>
