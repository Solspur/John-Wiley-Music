<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>John Wiley Music | Conversations With Myself</title>
    <style>
        :root {
            --mint-green: #aaf0d1;
            --off-white: #f9f9f9;
            --dark-gray: #333;
            --accent-black: #1a1a1a;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--off-white);
            color: var(--dark-gray);
            margin: 0;
            padding: 0;
            line-height: 1.6;
            text-align: center;
        }

        /* Header Section */
        header {
            padding: 40px 20px;
        }

        .pill-heading {
            background-color: var(--mint-green);
            color: black;
            display: inline-block;
            padding: 15px 60px;
            border-radius: 50px;
            font-size: 2.5rem;
            font-weight: bold;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .sub-headline {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 40px;
        }

        /* Video Section */
        .video-container {
            max-width: 900px;
            margin: 0 auto 50px;
            padding: 0 20px;
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            overflow: hidden;
            border-radius: 12px;
            background: #000;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Linktree Embed Section */
        .links-section {
            background-color: #fff;
            padding: 60px 20px;
        }

        .links-container {
            max-width: 600px;
            margin: 0 auto;
            border: 1px solid #eee;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        /* Contact Section */
        .contact-section {
            padding: 80px 20px;
            background-color: var(--accent-black);
            color: white;
        }

        .contact-section h2 {
            font-size: 2rem;
            margin-bottom: 20px;
        }

        .email-link {
            color: var(--mint-green);
            text-decoration: none;
            font-size: 1.5rem;
            font-weight: bold;
            transition: opacity 0.3s;
        }

        .email-link:hover {
            opacity: 0.8;
        }

        footer {
            padding: 40px;
            font-size: 0.9rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <header>
        <div class="pill-heading">John Wiley</div>
        <div class="sub-headline">Conversations With Myself — Out Now</div>
    </header>

    <section class="video-container">
        <div class="video-wrapper">
            <iframe 
                src="https://www.youtube.com/embed/NIfsY1h7xAg" 
                title="Conversations With Myself Visualizer" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                allowfullscreen>
            </iframe>
        </div>
        <p style="margin-top: 15px;">Official Visualizer</p>
    </section>

    <section class="links-section">
        <h3>Stream & Purchase</h3>
        <div class="links-container">
            <iframe src="https://linktr.ee/johnwileymusic" 
                    style="width: 100%; height: 600px; border: none;" 
                    title="John Wiley Music Linktree">
            </iframe>
        </div>
    </section>

    <section class="contact-section">
        <h2>Get in Touch</h2>
        <p>For bookings or inquiries:</p>
        <a href="mailto:johnnymusic3500@gmail.com" class="email-link">johnnymusic3500@gmail.com</a>
    </section>

    <footer>
        &copy; 2026 John Wiley Music. All rights reserved.
    </footer>

</body>
</html>
