<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>John Wiley Music | Conversations With Myself</title>
    <style>
        :root {
            --mint-green: #aaf0d1;
            --off-white: #f4f4f4;
            --dark-gray: #222;
            --accent-black: #121212;
            --glass: rgba(255, 255, 255, 0.7);
        }

        /* Subtle Animated Grain Texture */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Noisy_Texture.png');
            opacity: 0.05;
            pointer-events: none;
            z-index: 9999;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: 
                radial-gradient(circle at 10% 20%, rgba(170, 240, 209, 0.2) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(170, 240, 209, 0.2) 0%, transparent 40%),
                var(--off-white);
            color: var(--dark-gray);
            margin: 0;
            padding: 0;
            line-height: 1.6;
            text-align: center;
        }

        header {
            padding: 60px 20px;
        }

        /* Mint Green Pill Heading */
        .pill-heading {
            background-color: var(--mint-green);
            color: black;
            display: inline-block;
            padding: 15px 70px;
            border-radius: 100px;
            font-size: clamp(1.8rem, 6vw, 3rem);
            font-weight: 900;
            letter-spacing: -1px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        .sub-headline {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 6px;
            font-weight: 300;
            color: #555;
        }

        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 30px;
            max-width: 800px;
            margin: 0 auto 60px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 15px;
            background: #000;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
        }

        /* Custom Link Buttons (Replacing the broken Linktree embed) */
        .link-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 400px;
            margin: 0 auto;
        }

        .music-btn {
            background: white;
            color: var(--dark-gray);
            text-decoration: none;
            padding: 18px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.1rem;
            border: 1px solid #ddd;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .music-btn:hover {
            background: var(--mint-green);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border-color: transparent;
        }

        .contact-section {
            padding: 100px 20px;
            background-color: var(--accent-black);
            color: white;
            clip-path: polygon(0 10%, 100% 0, 100% 100%, 0 100%);
        }

        .email-link {
            color: var(--mint-green);
            text-decoration: none;
            font-size: clamp(1.2rem, 5vw, 2rem);
            font-weight: bold;
            transition: letter-spacing 0.3s ease;
        }

        .email-link:hover {
            letter-spacing: 2px;
        }

        footer {
            background: var(--accent-black);
            padding: 40px;
            font-size: 0.8rem;
            color: #444;
        }
    </style>
</head>
<body>

    <header>
        <div class="pill-heading">John Wiley</div>
        <div class="sub-headline">Conversations With Myself</div>
    </header>

    <div class="glass-panel">
        <div class="video-wrapper">
            <iframe 
                src="https://www.youtube.com/embed/NIfsY1h7xAg" 
                title="Conversations With Myself Visualizer" 
                allowfullscreen>
            </iframe>
        </div>
        <p style="margin-top: 20px; font-style: italic; opacity: 0.6;">EP Visualizer</p>
    </div>

    <div class="glass-panel">
        <h2 style="margin-bottom: 30px; letter-spacing: 2px;">STREAM / DOWNLOAD</h2>
        <div class="link-grid">
            <a href="https://linktr.ee/johnwileymusic" target="_blank" class="music-btn">
                🎧 ALL PLATFORMS (Linktree)
            </a>
            <a href="https://open.spotify.com" target="_blank" class="music-btn">
                🟢 SPOTIFY
            </a>
            <a href="https://music.apple.com" target="_blank" class="music-btn">
                🍎 APPLE MUSIC
            </a>
        </div>
    </div>

    <section class="contact-section">
        <h2 style="letter-spacing: 4px;">CONTACT</h2>
        <p>Inquiries / Lessons / Bookings</p>
        <a href="mailto:johnnymusic3500@gmail.com" class="email-link">johnnymusic3500@gmail.com</a>
    </section>

    <footer>
        &copy; 2026 John Wiley Music. All rights reserved.
    </footer>

</body>
</html>
